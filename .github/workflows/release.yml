name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build arm64 DMG and publish release
    runs-on: macos-26
    env:
      PRODUCT_NAME: GridMove
      RELEASE_APP_NAME: GridMove
      DEV_APP_NAME: GridMove Dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        shell: bash
        run: |
          developer_dir=""
          best_key=""

          while IFS= read -r app_path; do
            app_name="$(basename "${app_path}" .app)"
            version="${app_name#Xcode_}"

            if [[ "${version}" == *beta* ]]; then
              continue
            fi

            version_key="$(
              awk -F. '{
                major = ($1 == "" ? 0 : $1)
                minor = ($2 == "" ? 0 : $2)
                patch = ($3 == "" ? 0 : $3)
                printf("%03d%03d%03d\n", major, minor, patch)
              }' <<< "${version}"
            )"

            if [[ -z "${best_key}" || "${version_key}" > "${best_key}" ]]; then
              best_key="${version_key}"
              developer_dir="${app_path}/Contents/Developer"
            fi
          done < <(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app')

          if [[ ! -d "${developer_dir}" ]]; then
            developer_dir="$(xcode-select -p)"
          fi

          if [[ ! -d "${developer_dir}" ]]; then
            echo "Unable to resolve DEVELOPER_DIR." >&2
            exit 1
          fi

          echo "DEVELOPER_DIR=${developer_dir}" >> "${GITHUB_ENV}"
          "${developer_dir}/usr/bin/xcodebuild" -version
          DEVELOPER_DIR="${developer_dir}" xcrun swift --version

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version="$(tr -d '\n' < VERSION)"
            version="${version#v}"
            short_sha="$(git rev-parse --short=7 HEAD)"
            tag="v${version}-pre.${short_sha}"
          fi

          tag="${tag#refs/tags/}"
          if [[ -z "${tag}" || -z "${version}" ]]; then
            echo "Release tag or version is missing." >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Resolve artifact names
        id: artifact_names
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            app_name="${DEV_APP_NAME}"
          else
            app_name="${RELEASE_APP_NAME}"
          fi

          {
            echo "app_name<<EOF"
            echo "${app_name}"
            echo "EOF"
            echo "app_bundle<<EOF"
            echo "dist/${app_name}.app"
            echo "EOF"
            echo "app_dmg<<EOF"
            echo "dist/${app_name}.dmg"
            echo "EOF"
            echo "arm64_dmg<<EOF"
            echo "dist/${app_name}.arm64.dmg"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Sync version for tag release
        if: github.event_name == 'push'
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release_tag.outputs.version }}
        run: |
          current_version="$(tr -d '\n' < VERSION)"
          target_version="${RELEASE_VERSION}"

          if [[ "${current_version}" == "${target_version}" ]]; then
            exit 0
          fi

          make update-version VERSION="${RELEASE_TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: sync version to ${RELEASE_TAG}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
          git checkout --detach "${GITHUB_SHA}"

      - name: Build release package
        if: github.event_name == 'push'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          make release-ci RELEASE_TAG="${RELEASE_TAG}"
          mv "${{ steps.artifact_names.outputs.app_dmg }}" "${{ steps.artifact_names.outputs.arm64_dmg }}"

      - name: Build prerelease package
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          make build
          mv "${{ steps.artifact_names.outputs.app_dmg }}" "${{ steps.artifact_names.outputs.arm64_dmg }}"

      - name: Verify arm64 binary
        shell: bash
        run: |
          binary_path="${{ steps.artifact_names.outputs.app_bundle }}/Contents/MacOS/${PRODUCT_NAME}"
          file "${binary_path}"
          [[ "$(lipo -archs "${binary_path}")" == "arm64" ]]

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          asset_path="${{ steps.artifact_names.outputs.arm64_dmg }}"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            release_id="$(gh release view "${RELEASE_TAG}" --json id --jq '.id')"
            gh release upload "${RELEASE_TAG}" "${asset_path}" --clobber

            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              gh api \
                --method PATCH \
                "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
                -f prerelease=true \
                -f make_latest=false \
                -f name="${RELEASE_TAG}" >/dev/null
            else
              gh api \
                --method PATCH \
                "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
                -f prerelease=false \
                -f make_latest=true \
                -f name="${RELEASE_TAG}" >/dev/null
            fi
          else
            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              gh release create "${RELEASE_TAG}" "${asset_path}" \
                --target "${GITHUB_SHA}" \
                --generate-notes \
                --latest=false \
                --prerelease \
                --title "${RELEASE_TAG}"
            else
              gh release create "${RELEASE_TAG}" "${asset_path}" \
                --generate-notes \
                --title "${RELEASE_TAG}" \
                --verify-tag
            fi
          fi
